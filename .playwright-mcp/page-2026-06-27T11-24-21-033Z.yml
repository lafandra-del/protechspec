                  - text: · ✨
                  - strong [ref=e1156]:
                    - text: 150 brand-grade
                    - code [ref=e1157]: DESIGN.md
                    - text: systems
                  - text: · 📦
                  - strong [ref=e1158]: 261 ready-to-use plugins.
                  - text: 🖼️ Generates
                  - strong [ref=e1159]: web · desktop · mobile prototypes
                  - text: ","
                  - strong [ref=e1160]: live dashboards / artifacts
                  - text: ","
                  - strong [ref=e1161]: decks
                  - text: ","
                  - strong [ref=e1162]: images
                  - text: ","
                  - strong [ref=e1163]: video
                  - text: ", plus"
                  - strong [ref=e1164]: HyperFrames
                  - text: motion graphics. 🔒 Sandboxed iframe preview · HTML / PDF / PPTX / MP4 export. 🤖
                  - strong [ref=e1165]: Runs on Claude Code · OpenClaw · Codex · Cursor · OpenCode · Qwen · Copilot · Amp · Hermes · Kimi · Antigravity and 22 local CLIs
                  - text: ", or any OpenAI-compatible endpoint via BYOK."
                - paragraph [ref=e1166]:
                  - text: Open Design is what you get when the
                  - strong [ref=e1167]: agent-native
                  - text: loop Anthropic shipped with Claude Design — discover the brief, lock the direction, stream the artifact, critique, deliver — stops being closed and becomes a
                  - strong [ref=e1168]: filesystem of skills, design systems, and plugins
                  - text: that the coding agents already on your laptop can read, write, and remix. Your CLI becomes the design engine, your laptop becomes the studio, and your team's
                  - code [ref=e1169]: DESIGN.md
                  - text: becomes the brand contract.
                - paragraph [ref=e1170]:
                  - text: It's also the
                  - strong [ref=e1171]: Figma alternative for the agent era
                  - text: — instead of pushing pixels on a canvas, it delivers single-page artifacts in real CSS, real fonts, real components, exported straight to HTML / PDF / PPTX / MP4 — already shaped by your design system, already runnable inside the agent you use every day.
