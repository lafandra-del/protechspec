                      - strong [ref=e1367]: "What it is:"
                      - text: Anthropic's closed-source AI design product. Released 2026-04-17. Powered by Opus 4.7. Web-only (claude.ai). Generates prototypes, wireframes, decks, marketing pages, complex prototypes with voice/video/3D/shaders.
                    - listitem [ref=e1368]:
                      - strong [ref=e1369]: "Why it matters to us:"
                      - text: Defines the category. Its viral moment (~60M X impressions week 1) proves the market.
