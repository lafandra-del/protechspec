                    - listitem [ref=e1372]:
                      - strong [ref=e1373]: "What we don't:"
                      - text: Closed source. Anthropic-only models. No self-hosting. Paid tiers (Pro/Max/Team/Enterprise) only. We are not trying to be a drop-in clone; we are an
