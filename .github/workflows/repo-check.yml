name: repo-check

permissions:
  contents: read

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  checks:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22

      - name: Run repo checks
        shell: pwsh
        run: ./tools/check.ps1
