name: Deploy

permissions:
  contents: read

on:
  push:
    branches: [master]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        with:
          host: 155.212.216.124
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          fingerprint: SHA256:mWHE95RoPW7vUOS1eug2Wf9eXxJ04Cjc3rmfLuaBCK0
          command_timeout: 2m
          script_stop: true
          script: /usr/local/sbin/deploy-landing
